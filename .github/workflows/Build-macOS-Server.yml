name: Build macOS Server

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build-macos-server:
    name: macOS Server
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Homebrew dependencies
      run: |
        brew install cmake ninja pkg-config eigen nlohmann-json cli11 boost openssl librsvg

    - name: Prepare Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.3.296.0
        vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Reflect, SPIRV-Tools, MoltenVK
        vulkan-use-cache: true

    - uses: actions/cache@v4
      with:
        key: cmake-macos-server
        path: |
          ${{github.workspace}}/cmake-fetch/*-subbuild/*-populate-prefix/src/*.tar.*
          ${{github.workspace}}/cmake-fetch/*-subbuild/*-populate-prefix/src/*.zip
          ${{github.workspace}}/cmake-fetch/*.tar.*
          ${{github.workspace}}/cmake-fetch/*.tgz
          ${{github.workspace}}/cmake-fetch/*-src/.git
        restore-keys: cmake-macos-

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -GNinja
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DFETCHCONTENT_BASE_DIR=${{github.workspace}}/cmake-fetch
        --preset server-macos
        -DWIVRN_USE_SYSTEM_OPENXR=OFF
        -DGIT_DESC=${{github.sha}}
        -DGIT_COMMIT=${{github.sha}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build

    - name: Archive server binaries
      uses: actions/upload-artifact@v4
      with:
        name: wivrn-server-macos
        path: |
          ${{github.workspace}}/build/server/wivrn-server
          ${{github.workspace}}/build/server/wivrn-compositor
        retention-days: 30
